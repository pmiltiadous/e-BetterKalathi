<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-BetterKalathi</title>
    <link rel="stylesheet" href="{{ url_for('styles', path='/styles.css') }}">
</head>

<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">
                    <span>e-BetterKalathi</span>
                </a>
                <button class="cart-btn" onclick="toggleCart()">
                    Cart <span class="cart-badge" id="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="container">
        <div class="hero">
            <div class="hero-text">
                <h2>Your Supermarket <span class="highlight">Simplified</span></h2>
                <p>Track your cart items, compare prices across supermarkets, and save money.</p>
            </div>
        </div>
    </section>

    <section class="categories">
        <div class="container">
            <div class="categories-wrapper">
                <div class="categories-scroll" id="categories">
                </div>
            </div>
        </div>
    </section>

    <!-- Products -->
    <section class="products-section">
        <div class="container">
            <div class="section-header">
                <h3 id="section-title">All Products</h3>
                <p id="product-count">0 products available</p>
            </div>
            <div class="search-bar">
                <input type="text" id="product-search" placeholder="Search products..."
                    oninput="searchProducts(this.value)">
            </div>

            <div class="products-grid" id="products-grid"></div>

            <div id="pagination-controls" class="pagination-container"></div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h2>Shopping Cart</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>

        <!-- Scrollable items -->
        <div class="cart-items" id="cart-items">
            <div class="empty-cart">
                <p>Your cart is empty</p>
            </div>
        </div>

        <div class="cart-footer">
            <div class="town-selector-wrapper">
                <label for="cart-town">Select your town:</label>
                <select id="cart-town">
                    <option value="">Loading towns...</option>
                </select>
            </div>

            <div class="cart-total">
                <span>Starting from:</span><span id="cart-total">€0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="loader-overlay" style="display: none;">
        <div class="loader"></div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>© 2026 PM. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('scripts', path='index.js') }}"></script>
    <script src="{{ url_for('scripts', path='common.js') }}"></script>
</body>

</html>
